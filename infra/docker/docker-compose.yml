services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    container_name: todo-p2p-web
    ports:
      - "5173:5173"
    volumes:
      - ../..:/workspace
      - /workspace/node_modules
      - /workspace/apps/web/node_modules
      - /workspace/packages/core/node_modules
      - /workspace/packages/ui/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: bun --filter @todo-p2p/web dev -- --host 0.0.0.0
